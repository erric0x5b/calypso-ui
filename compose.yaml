services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: calypso-ui-backend
    environment:
      CALYPSO_HTTP_PORT: "${CALYPSO_HTTP_PORT:-80}"
      CALYPSO_UDP_RX_PORT: "${CALYPSO_UDP_RX_PORT:-14590}"
      CALYPSO_UDP_TX_PORT: "${CALYPSO_UDP_TX_PORT:-14591}"
      CALYPSO_CONTROLLER_UDP_PORT: "${CALYPSO_CONTROLLER_UDP_PORT:-5010}"
      CALYPSO_LOG_DIR: "/data/deepex_logs"
      CALYPSO_UDP_TX_HOST: "${CALYPSO_UDP_TX_HOST:-192.168.2.3}"
      MAVLINK_ENABLED: "${MAVLINK_ENABLED:-1}"
      MAVLINK_HOST: "${MAVLINK_HOST:-127.0.0.1}"
      MAVLINK_PORT: "${MAVLINK_PORT:-14550}"
      MAVLINK_WS_URL: "${MAVLINK_WS_URL:-ws://192.168.2.2:6040/v1/ws/mavlink}"
    ports:
      - "${HOST_HTTP_PORT:-8090}:80"
      - "${HOST_UDP_RX_PORT:-14590}:14590/udp"
      - "${HOST_UDP_TX_PORT:-14591}:14591/udp"
      - "${HOST_CONTROLLER_UDP_PORT:-5010}:${CALYPSO_CONTROLLER_UDP_PORT:-5010}/udp"
    volumes:
      - .:/app
      - "${CALYPSO_LOGS_PATH:-./data/logs}:/data/deepex_logs"
    restart: unless-stopped
    networks:
      calypso-net:
        aliases:
          - backend

networks:
  calypso-net:
    driver: bridge
